                      - generic [ref=e2571]:
                        - generic [ref=e2577]:
                          - paragraph [ref=e2578]: This is an excellent pull-up bar. It was easy enough to setup, holds extremely firmly to my doorframe, and is comfortable enough to do pull ups and hangs without any issue whatsoever. The setup and readjustment is fast and easy, and I have also played with setting it at different heights to do rows.
                          - paragraph [ref=e2579]: No drilling or hooks or any other attachment was needed. I was able to set it up easily on my doorframe. With proper setup, I am able to close my door without any issues.
                          - paragraph [ref=e2580]: The handle is a bit on the thicker side, which took me a few days to get used to, but the material used here is very comfortable. After getting used to it, the ease of doing pull-ups on this bar and the confidence that it won't come off made it worthwhile.
                          - paragraph [ref=e2581]: The only slight downside is that the actual bar, where one can hold on and do pull-ups is not very wide. For me, doing shoulder width pull-ups was easy, at 5'7. But for my friend, who's 6'1, the bar was not wide enough to do shoulder width pull-ups comfortably. He has to hold onto the side latches, which aren't comfortable to hold onto for pull-ups. It's still a great option for getting basic pull-ups, chinups and dead hangs in. You just won't be able to do wide grip pull-ups on this thing.
                          - paragraph [ref=e2582]: Overall, this is a very good purchase, specially for the price of this thing.
