            - heading "About this item" [level=1] [ref=e719]
            - list [ref=e720]:
              - listitem [ref=e721]: "【No Drilling, No Traces】: The Sportneer pull up bar uses innovative fixative technology to hold the bar in place without the need for drilling. It is supported by 2 enlarged 6.5\"x1.8\" PVC mats to ensure enough friction for sustained use. The base and bar are connected by 4 metal fixed points that ensure the PVC mat is pressed outward if the bar slips from the base, which provides a fall-proof design for the user. The heavier the load, the more sturdy it is."
              - listitem [ref=e722]: "【Easy Installation】: Installed in a jiffy with just four easy steps! Thanks to its top-notch precision spirit level, the installation process is a breeze. Simply adjust it to your desired length and height, and you're ready to go. (Note: It's crucial to ensure that your doorway or wall is robust enough to support the bar. Avoid installing it on tiles, glass, or non-solid structures, as they may not provide the ideal surface for your fitness needs.)"
              - listitem [ref=e723]: "【Integrated & Adjustable Structure】: The extra-long anti-slip cotton handle is sweat-proof, odorless and wear-resistant, offering unparalleled grip flexibility. With a simple twist, you can effortlessly adjust the bar to any size between 29.9 inches and 37.4 inches (76 cm to 95 cm), allowing you to customize it for your pull-ups, sit-ups, push-ups, stretching exercises, and beyond."
              - listitem [ref=e724]: "【Strong Load-bearing Structure】: With a combination of a 2mm outer steel pipe and a 1.5mm inner steel pipe, along with a protruding protective structure and enlarged anti-slip pads, this pull-up bar is built to withstand a maximum weight of 337.5kg/744lbs, lasting effortlessly for years to comes! (Note: The recommended load-bearing is within 135kg; the load on the bar decreases as the distance increases.)"
              - listitem [ref=e725]: "【Unmatched Safety】: The lock mechanism prevents any unwanted rotation, while the triple-gear lock design ensures forward rotation only, preventing any loosening. The internal structure is automatically compressed, firmly locking onto the wall, providing unparalleled stability when exerting downward force. Plus, you can pull down the protruding protective structure to lock the bar for enhanced stability and extra peace of mind."
