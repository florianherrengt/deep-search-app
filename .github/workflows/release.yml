name: Publish Release

on:
  release:
    types:
      - published

jobs:
  publish-tauri:
    name: Build ${{ matrix.target }}
    permissions:
      contents: write
    runs-on: ${{ matrix.platform }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-15-intel
            target: x86_64-apple-darwin
            args: --target x86_64-apple-darwin
          - platform: macos-latest
            target: aarch64-apple-darwin
            args: --target aarch64-apple-darwin
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            args: ""
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            args: ""

    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Tauri Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            libayatana-appindicator3-dev \
            libgtk-3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            patchelf

      - name: Install dependencies
        run: npm ci

      - name: Write updater config
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          UPDATER_ENDPOINT: https://github.com/${{ github.repository }}/releases/latest/download/latest.json
          UPDATER_PUBKEY: ${{ secrets.TAURI_UPDATER_PUBKEY }}
        run: |
          if [ -z "$TAURI_SIGNING_PRIVATE_KEY" ]; then
            echo "::error::Missing TAURI_SIGNING_PRIVATE_KEY secret."
            exit 1
          fi

          if [ -z "$UPDATER_PUBKEY" ]; then
            echo "::error::Missing TAURI_UPDATER_PUBKEY secret."
            exit 1
          fi

          node <<'NODE'
          const fs = require("node:fs");

          const config = {
            bundle: {
              createUpdaterArtifacts: true,
            },
            plugins: {
              updater: {
                pubkey: process.env.UPDATER_PUBKEY,
                endpoints: [process.env.UPDATER_ENDPOINT],
                windows: {
                  installMode: "passive",
                },
              },
            },
          };

          fs.writeFileSync(
            "src-tauri/updater-config.json",
            JSON.stringify(config, null, 2),
          );
          NODE

      - name: Build and upload release assets
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          TAURI_TARGET_TRIPLE: ${{ matrix.target }}
        with:
          releaseId: ${{ github.event.release.id }}
          tagName: ${{ github.event.release.tag_name }}
          uploadUpdaterJson: true
          uploadUpdaterSignatures: true
          args: ${{ matrix.args }} --config src-tauri/updater-config.json
