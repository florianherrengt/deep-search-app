name: Publish Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version or tag, for example alpha-0.0.1 or v1.2.3
        required: true
        type: string
      notes:
        description: Optional release notes. Leave empty to generate notes from commits.
        required: false
        type: string
  release:
    types:
      - published

jobs:
  prepare-release:
    name: Prepare Release
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    outputs:
      release_id: ${{ steps.release.outputs.release_id }}
      tag: ${{ steps.version.outputs.tag }}
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event_name == 'release' && github.event.release.tag_name || github.ref }}

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: lts/*

      - name: Resolve release version
        id: version
        env:
          RELEASE_INPUT: ${{ github.event_name == 'release' && github.event.release.tag_name || inputs.version }}
        run: |
          release_json="$(npm run --silent release:set-version -- "$RELEASE_INPUT" --dry-run --json)"
          node -e '
            const data = JSON.parse(process.argv[1]);
            for (const [key, value] of Object.entries(data)) {
              console.log(`${key}=${value}`);
            }
          ' "$release_json" >> "$GITHUB_OUTPUT"

      - name: Create or locate release
        id: release
        env:
          EVENT_NAME: ${{ github.event_name }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EXISTING_RELEASE_ID: ${{ github.event.release.id }}
          RELEASE_NOTES: ${{ inputs.notes }}
          RELEASE_PRERELEASE: ${{ steps.version.outputs.prerelease }}
          RELEASE_TAG: ${{ steps.version.outputs.tag }}
          RELEASE_VERSION: ${{ steps.version.outputs.version }}
        run: |
          if [ "$EVENT_NAME" = "release" ]; then
            echo "release_id=$EXISTING_RELEASE_ID" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "::error::Release $RELEASE_TAG already exists."
            exit 1
          fi

          args=(
            "$RELEASE_TAG"
            "--repo" "$GITHUB_REPOSITORY"
            "--target" "$GITHUB_SHA"
            "--title" "Deep Search $RELEASE_TAG"
          )

          if [ "$RELEASE_PRERELEASE" = "true" ]; then
            args+=("--prerelease")
          fi

          if [ -n "$RELEASE_NOTES" ]; then
            notes_file="$(mktemp)"
            printf "%s" "$RELEASE_NOTES" > "$notes_file"
            args+=("--notes-file" "$notes_file")
          else
            args+=("--generate-notes")
          fi

          gh release create "${args[@]}"
          release_id="$(gh api "repos/$GITHUB_REPOSITORY/releases/tags/$RELEASE_TAG" --jq .id)"
          echo "release_id=$release_id" >> "$GITHUB_OUTPUT"

  publish-tauri:
    name: Build ${{ matrix.target }}
    needs: prepare-release
    permissions:
      contents: write
    runs-on: ${{ matrix.platform }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            args: --target aarch64-apple-darwin
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            args: ""
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            args: ""

    steps:
      - name: Checkout release tag
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.prepare-release.outputs.tag }}

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Set release version
        run: npm run release:set-version -- "${{ needs.prepare-release.outputs.tag }}"

      - name: Install Tauri Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            libayatana-appindicator3-dev \
            libgtk-3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            patchelf

      - name: Install dependencies
        run: npm ci

      - name: Write updater config
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          UPDATER_ENDPOINT: https://github.com/${{ github.repository }}/releases/latest/download/latest.json
          UPDATER_PUBKEY: ${{ secrets.TAURI_UPDATER_PUBKEY }}
        run: |
          if [ -z "$TAURI_SIGNING_PRIVATE_KEY" ]; then
            echo "::error::Missing TAURI_SIGNING_PRIVATE_KEY secret."
            exit 1
          fi

          if [ -z "$UPDATER_PUBKEY" ]; then
            echo "::error::Missing TAURI_UPDATER_PUBKEY secret."
            exit 1
          fi

          node <<'NODE'
          const fs = require("node:fs");

          const config = {
            bundle: {
              createUpdaterArtifacts: true,
            },
            plugins: {
              updater: {
                pubkey: process.env.UPDATER_PUBKEY,
                endpoints: [process.env.UPDATER_ENDPOINT],
              },
            },
          };

          fs.writeFileSync(
            "src-tauri/updater-config.json",
            JSON.stringify(config, null, 2),
          );
          NODE

      - name: Build and upload release assets
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          TAURI_TARGET_TRIPLE: ${{ matrix.target }}
        with:
          releaseId: ${{ needs.prepare-release.outputs.release_id }}
          tagName: ${{ needs.prepare-release.outputs.tag }}
          uploadUpdaterJson: true
          uploadUpdaterSignatures: true
          args: ${{ matrix.args }} --config src-tauri/tauri.release.conf.json --config src-tauri/updater-config.json
