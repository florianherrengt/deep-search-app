name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  test:
    name: Test
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Tauri Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            libayatana-appindicator3-dev \
            libgtk-3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            patchelf

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

      - name: Build frontend
        run: npm run build

      - name: Create dummy external binary for Tauri build
        run: touch src-tauri/binaries/node-x86_64-unknown-linux-gnu

      - name: Run Rust tests
        run: cargo test --manifest-path src-tauri/Cargo.toml
